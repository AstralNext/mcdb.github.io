<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCDB · Minecraft 中英对照目录</title>
  <meta name="description" content="Modrinth 等项目中英译名目录，支持模糊搜索与 API 接入。" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">MCDB <span>中英对照</span></div>
    <form id="search-form" class="search-form" role="search">
      <input id="q" name="q" type="search" placeholder="搜索中/英文标题，按 Enter" autocomplete="off" />
      <button type="submit">搜索</button>
    </form>
    <nav class="topbar-links">
      <a href="/api.html">API</a>
      <a href="https://github.com/AstralNext/MCDB" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>目录</h2>
      <ul id="cat-list" class="cat-list"></ul>
    </aside>

    <main class="main">
      <div id="error" class="error" hidden></div>
      <div id="status" class="status-bar">加载目录…</div>
      <div id="results" class="results"></div>
      <div id="pager" class="pager" hidden>
        <button type="button" id="prev-page" class="btn secondary">上一页</button>
        <button type="button" id="next-page" class="btn secondary">下一页</button>
      </div>
    </main>
  </div>

  <script src="/assets/app.js" defer></script>
</body>
</html>
